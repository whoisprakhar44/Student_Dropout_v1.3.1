  \ 'Categorical classification column. Standardized values include: School changed,\
  \ Duplicate Student, Left the school, Not feeling well.', \n  `reason_category`\
  \ STRING COMMENT 'Classification field defining the specific reason category.',\
  \ \n  `is_govt_approved` STRING COMMENT 'Field containing the is govt approved details\
  \ for the table.', \n  `is_active` STRING COMMENT 'Boolean indicator flag (values:\
