raw_ddl: "CREATE EXTERNAL TABLE `curated_datamodels`.`absent_reason_dim`(\n  `absent_reason_dim_id_pk`\
  \ BIGINT COMMENT 'Primary Key: Unique identifier for the absent reason dim record.',\
  \ \n  `reason_code` STRING COMMENT 'Code/ID column: Standardized system code representing\
  \ the reason. Categorical column. Distinct values: 5. Examples: 2, 4, 3, 1, 0. Top\
