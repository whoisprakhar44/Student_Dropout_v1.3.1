  \  VARCHAR2(100),\n  UPDATED_ON         TIMESTAMP(6) default SYSTIMESTAMP,\n  UPD_STATUS\
  \         VARCHAR2(20),\n  DEPARTMENT_NAME    VARCHAR2(100),\n  USER_TYPE      \
  \    VARCHAR2(20),\n  REASON             VARCHAR2(200),\n  IS_ACTIVE          VARCHAR2(1),\n\
  \  GENDER             VARCHAR2(20)\n  );"
