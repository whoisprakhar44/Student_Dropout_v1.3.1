raw_ddl: "create table GSWSONLINE.GSWS_HH_VOLUNTEER_MAPPING\n(\n  HOUSEHOLD_ID   \
  \      VARCHAR2(50),\n  UID_NUM              NUMBER not null,\n  CITIZEN_NAME  \
  \       VARCHAR2(300),\n  DOB_DT               DATE,\n  MOBILE_NUMBER        NUMBER,\n\
  \  GENDER               VARCHAR2(50),\n  IS_LIVING_WITHFAMILY NUMBER not null,\n\
  \  IS_HOFAMILY          NUMBER not null,\n  IS_MEMBERADDED       NUMBER not null,\n\
  \  IS_MEMBERDELETED     NUMBER not null,\n  RELATION_WITHHOF     NUMBER,\n  FATHER_AADHAAR\
  \       VARCHAR2(200),\n  MOTHER_AADHAAR       VARCHAR2(200),\n  SPOUSE_AADHAAR\
  \       VARCHAR2(200),\n  IS_MARRIED           NUMBER not null,\n  TEMP_ID     \
  \         VARCHAR2(100) not null,\n  NEW_HH_ID            NUMBER,\n  UPDATED_BY\
  \           VARCHAR2(50),\n  UPDATED_ON           TIMESTAMP(6),\n  INSERTED_BY \
  \         VARCHAR2(50) not null,\n  INSERTED_ON          TIMESTAMP(6) default sysdate,\n\
  \  DISTRICT_CODE        NUMBER not null,\n  MANDAL_CODE          NUMBER not null,\n\
  \  GSWS_CODE            NUMBER not null,\n  DOOR_NO              VARCHAR2(50) not\
  \ null,\n  STATUS               NUMBER default 0,\n  HOUSE_IMAGE_PATH     VARCHAR2(500)\
  \ not null,\n  CLUSTER_ID           NUMBER not null,\n  CLUSTER_NAME         VARCHAR2(100),\n\
  \  HH_UPDATE_STATUS     NUMBER,\n  HH_ID                VARCHAR2(100),\n  CITIZEN_NAME_TELUGU\
  \  NVARCHAR2(400),\n  CARE_OF_TELUGU       NVARCHAR2(400),\n  IS_DISABLED      \
  \    NUMBER,\n  REMARKS              VARCHAR2(200),\n  UNIQUE_ID            VARCHAR2(2000),\n\
  \  NEW_MOBILENUMBER     NUMBER,\n  RESIDENT_ID          NUMBER,\n  PERMANENT_GSWS_CODE\
  \  NUMBER,\n  PERMANENT_CLUSTER_ID NUMBER,\n  CAREOF               NVARCHAR2(400)\n\
  \  );"
