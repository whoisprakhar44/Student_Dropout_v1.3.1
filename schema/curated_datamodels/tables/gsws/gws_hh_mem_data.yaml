raw_ddl: "create table GSWSONLINE.GWS_HH_MEM_DATA\n(\n  LGD_DIST_CODE     NUMBER,\n\
  \  DISTRICT_NAME     VARCHAR2(200),\n  LGD_MANDAL_CODE   NUMBER,\n  MANDAL_NAME\
  \       VARCHAR2(200),\n  SECRETARIAT_CODE  NUMBER,\n  SECRETARIAT_NAME  VARCHAR2(200),\n\
  \  RURAL_URBAN_FLAG  VARCHAR2(10),\n  CLUSTER_ID        NUMBER not null,\n  CITIZEN_NAME\
  \      VARCHAR2(300),\n  UID_NUM           NUMBER not null,\n  TEMP_ID         \
  \  VARCHAR2(100) not null,\n  DOOR_NO           VARCHAR2(50) not null,\n  DOB_DT\
  \            DATE,\n  GENDER            VARCHAR2(11),\n  CASTE             VARCHAR2(600),\n\
  \  SUBCASTE          VARCHAR2(600),\n  MOBILE_NUMBER     NUMBER,\n  RELATIONSHIP\
  \      VARCHAR2(600),\n  PINCODE           NUMBER,\n  HODFAMILY         CHAR(1),\n\
  \  RESIDENT_ID       NUMBER,\n  EKYCSTATUS        VARCHAR2(6),\n  QUALIFICATION\
  \     VARCHAR2(150),\n  OCCUPATION        VARCHAR2(150),\n  EMPLOYEESTATUS    VARCHAR2(150),\n\
  \  AGRICULTURELAND   VARCHAR2(150),\n  RESIDENTALLAND    VARCHAR2(150),\n  GASCONNECTION\
  \     VARCHAR2(150),\n  RELIGION          VARCHAR2(150),\n  WATERRESOURCE     VARCHAR2(150),\n\
  \  HOUSETYPE         VARCHAR2(150),\n  MARITALSTATUS     VARCHAR2(150),\n  DEFECATIONSTATUS\
  \  VARCHAR2(150),\n  POULTRYSTATUS     VARCHAR2(150),\n  OCCUPATIONSECTOR  VARCHAR2(150),\n\
  \  ELECTRICITYMETER  VARCHAR2(10),\n  FOURWHEELER       VARCHAR2(10),\n  URBANPROPERTY\
  \     VARCHAR2(60),\n  RICECARD          VARCHAR2(30),\n  AGE               NUMBER,\n\
  \  DRYLAND           VARCHAR2(30),\n  WETLAND           VARCHAR2(30),\n  PANCHAYAT_CODE\
  \    VARCHAR2(200),\n  PANCHAYAT_NAME    VARCHAR2(200),\n  HABITATION_NAME   VARCHAR2(200),\n\
  \  WARDNUMBER        VARCHAR2(30),\n  CASTECATEGORY     VARCHAR2(50),\n  CASTETYPE\
  \         VARCHAR2(10),\n  HODFAM            CHAR(1),\n  FATHERHUSBANDNAME VARCHAR2(300),\n\
  \  DEAD_TYPE         VARCHAR2(3),\n  MAINCASTE         VARCHAR2(50),\n  SUBCASTESNO\
  \       VARCHAR2(13)\n  );"
