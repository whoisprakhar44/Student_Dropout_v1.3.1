description: 'GSWS table: They have implemented a caste servey in the month of 2024
  jan where they captured around 20-22 columns.total data is available in the normalized
  format.they have captured in the dynamic tables but after normalization and freezing
  of the screen they have kept it in normalized format for utilizing the other departments.
  House type and water surce , occupation sector are static data they dont have dynamic
  data for this. Check volunteer mapping table columns'
