raw_ddl: "CREATE EXTERNAL TABLE `curated_datamodels`.`citizen_land`(\n  `citizen_land_id_pk`\
  \ INT COMMENT 'Primary Key: Unique identifier for the citizen land record.', \n\
  \  `citizen_master_fk` INT COMMENT 'Foreign Key: Links to the associated citizen\
  \ master dimension or master table.', \n  `land_id` STRING COMMENT 'Identifier key\
  \ referencing the associated land.', \n  `land_type` STRING COMMENT 'Classification\
  \ field defining the specific land type.', \n  `acres` STRING COMMENT 'The area\
  \ size of the land holding measured in acres.', \n  `survey_no` STRING COMMENT 'The\
  \ official land survey number or sub-division number of the land parcel.', \n  `location`\
  \ STRING COMMENT 'A text description or address of the physical location of the\
  \ asset or land.', \n  `district_id` STRING COMMENT 'Identifier key referencing\
  \ the associated district.', \n  `mandal_id` STRING COMMENT 'Identifier key referencing\
  \ the associated mandal.', \n  `village_name` STRING COMMENT 'The official name\
  \ of the village/habitation where the school or citizen address is located.', \n\
  \  `registration_no` STRING COMMENT 'Registration no.', \n  `registration_date`\
  \ STRING COMMENT 'The specific date or timestamp when the registration occurred.',\
  \ \n  `market_value` STRING COMMENT 'The estimated or registered market value of\
  \ the property or land parcel in INR.', \n  `soil_type` STRING COMMENT 'Classification\
  \ field defining the specific soil type.', \n  `irrigation_type` STRING COMMENT\
  \ 'Classification field defining the specific irrigation type.', \n  `encumbrance_status`\
  \ STRING COMMENT 'System field indicating the current encumbrance status of the\
  \ record.', \n  `created_date` STRING COMMENT 'Timestamp indicating exactly when\
  \ this record was originally created in the source system.', \n  `created_by` STRING\
  \ COMMENT 'The user ID or automated system process responsible for creating this\
  \ record.', \n  `updated_date` STRING COMMENT 'Timestamp indicating the last time\
  \ this record was modified or updated.', \n  `updated_by` STRING COMMENT 'The user\
  \ ID or automated system process responsible for the most recent update to this\
  \ record.')\nROW FORMAT SERDE \n  'org.apache.iceberg.mr.hive.HiveIcebergSerDe'\
  \ \nSTORED BY \n  'org.apache.iceberg.mr.hive.HiveIcebergStorageHandler'\n\nLOCATION\n\
  \  'hdfs://datalakedev/user/CURATED/curated_datamodels/canonicalmodel/citizen_land'"
