raw_ddl: "CREATE EXTERNAL TABLE `curated_datamodels`.`citizen_master`(\n  `citizen_master_pk`\
  \ BIGINT COMMENT 'Primary Key: Unique identifier for the citizen master record.',\
  \ \n  `citizen_idty_fk` BIGINT COMMENT 'Foreign Key: Links to the associated citizenty\
  \ dimension or master table.', \n  `first_name` STRING COMMENT 'The first name of\
  \ the citizen.', \n  `middle_name` STRING COMMENT 'The middle name of the citizen\
  \ (if applicable).', \n  `last_name` STRING COMMENT 'The last name / family name\
  \ of the citizen.', \n  `full_name` STRING COMMENT 'The complete legal name of the\
  \ citizen or individual.', \n  `birth_date` STRING COMMENT 'The specific date or\
  \ timestamp when the birth occurred.', \n  `gender` STRING COMMENT 'Gender of the\
  \ individual. Categorical column. Distinct values: MALE, FEMALE.', \n  `marital_status`\
  \ STRING COMMENT 'Marital status code. Categorical column. Distinct values: 0 (Single/Unmarried),\
  \ 1 (Married), 2 (Widowed), 3 (Divorced).', \n  `residency_status` STRING COMMENT\
  \ 'Categorical column. Distinct values: 1045735750, 1286552336, 1312143190, 1374783456,\
  \ 1802477394.', \n  `status_code` STRING COMMENT 'Code/ID column: The current operational\
  \ status code of the record (e.g., ''ACTIVE'', ''INACTIVE'', ''PENDING''). Categorical\
  \ column. Distinct values: 1. Top frequencies: 53024008. Categorical column.', \n\
  \  `primary_language` STRING COMMENT 'Primary language.', \n  `image_url` STRING\
  \ COMMENT 'The URL/path pointing to the photograph or digital image of the citizen/student.',\
  \ \n  `deceased_date` STRING COMMENT 'The specific date or timestamp when the deceased\
  \ occurred.', \n  `religion` STRING COMMENT 'Religion of the individual. Categorical\
  \ column. Distinct values: Hindu, Muslim, Christian, Sikh, Buddhist, Jain.', \n\
  \  `caste` STRING COMMENT 'Caste category. Categorical column. Distinct values:\
  \ BC-A, BC-B, BC-C, BC-D, BC-E, SC, ST, OC.', \n  `source_system` STRING COMMENT\
  \ 'The name of the source department database or application from which this data\
  \ was ingested.', \n  `created_date` TIMESTAMP COMMENT 'Timestamp indicating exactly\
  \ when this record was originally created in the source system.', \n  `updated_date`\
  \ TIMESTAMP COMMENT 'Timestamp indicating the last time this record was modified\
  \ or updated.', \n  `created_by` STRING COMMENT 'The user ID or automated system\
  \ process responsible for creating this record.', \n  `updated_by` STRING COMMENT\
  \ 'The user ID or automated system process responsible for the most recent update\
  \ to this record.', \n  `primary_mobile` STRING COMMENT 'Primary mobile contact\
  \ number.', \n  `secondary_mobile` STRING COMMENT 'Secondary mobile contact number.',\
  \ \n  `email_address` STRING COMMENT 'Primary email address.')\nROW FORMAT SERDE\
  \ \n  'org.apache.iceberg.mr.hive.HiveIcebergSerDe' \nSTORED BY \n  'org.apache.iceberg.mr.hive.HiveIcebergStorageHandler'\n\
  \nLOCATION\n  'hdfs://datalakedev/user/CURATED/curated_datamodels/canonicalmodel/citizen_master'"
