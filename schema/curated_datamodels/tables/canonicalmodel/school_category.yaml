raw_ddl: "CREATE EXTERNAL TABLE `curated_datamodels`.`school_category`(\n  `school_category_id_pk`\
  \ BIGINT COMMENT 'Primary Key: Unique identifier for the school category record.',\
  \ \n  `category_code` STRING COMMENT 'Code/ID column: Standardized system code representing\
  \ the category. Categorical column. Distinct values: 10. Examples: 11, 2, 8, 4,\
  \ 6. Top frequencies: 1, 1, 1, 1, 1. Categorical column.', \n  `category_name` STRING\
  \ COMMENT 'Categorical classification column. Standardized values include: PRIMARY\
  \ WITH UPPER PRIMARY, PR. UP PR. AND SECONDARY ONLY, UPPER PRIMARY ONLY, SECONDARY\
  \ ONLY, HIGHER SECONDARY ONLY.', \n  `category_type` STRING COMMENT 'Categorical\
  \ column. Distinct values: COLLEGE, HIGH SCHOOL, UPPER PRIMARY.', \n  `min_class`\
  \ INT COMMENT 'The minimum class or grade level (e.g. Class 1 or Class 6) for which\
  \ this category/subject is applicable.', \n  `max_class` INT COMMENT 'The maximum\
  \ class or grade level (e.g. Class 5 or Class 10) for which this category/subject\
