raw_ddl: "CREATE EXTERNAL TABLE `curated_datamodels`.`citizen_welfare_schemes`(\n\
  \  `citizen_welfare_schemes_pk` INT COMMENT 'Primary Key: Unique identifier for\
  \ the citizen welfare schemes record.', \n  `citizen_welfare_scheme_master_fk` INT\
  \ COMMENT 'Foreign Key: Links to welfare schemes master.', \n  `citizen_master_fk`\
  \ INT COMMENT 'Foreign Key: Links to the associated citizen master dimension or\
  \ master table.', \n  `scheme_name` STRING COMMENT 'Name of the welfare/health scheme.',\
  \ \n  `scheme_registered_date` STRING COMMENT 'The specific date or timestamp when\
  \ the scheme registered occurred.', \n  `scheme_approved_date` STRING COMMENT 'The\
  \ specific date or timestamp when the scheme approved occurred.', \n  `scheme_processed_date`\
  \ STRING COMMENT 'The specific date or timestamp when the scheme processed occurred.',\
  \ \n  `scheme_processed_amount` STRING COMMENT 'Amount processed under the welfare\
  \ scheme.', \n  `scheme_unutilized_amount` STRING COMMENT 'Unutilized amount under\
  \ the welfare scheme.', \n  `created_date` TIMESTAMP COMMENT 'Timestamp indicating\
  \ exactly when this record was originally created in the source system.', \n  `created_by`\
  \ STRING COMMENT 'The user ID or automated system process responsible for creating\
  \ this record.', \n  `updated_date` TIMESTAMP COMMENT 'Timestamp indicating the\
  \ last time this record was modified or updated.', \n  `updated_by` STRING COMMENT\
  \ 'The user ID or automated system process responsible for the most recent update\
  \ to this record.')\nROW FORMAT SERDE \n  'org.apache.iceberg.mr.hive.HiveIcebergSerDe'\
  \ \nSTORED BY \n  'org.apache.iceberg.mr.hive.HiveIcebergStorageHandler'\n\nLOCATION\n\
  \  'hdfs://datalakedev/user/CURATED/curated_datamodels/canonicalmodel/citizen_welfare_schemes'"
