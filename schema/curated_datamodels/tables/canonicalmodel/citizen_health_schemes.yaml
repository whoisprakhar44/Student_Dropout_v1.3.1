  \ the associated citizen master dimension or master table.', \n  `health_card_id`\
  \ STRING COMMENT 'Unique identifier for health card.', \n  `scheme_name` STRING\
  \ COMMENT 'Name of the welfare/health scheme.', \n  `household_id` STRING COMMENT\
  \ 'Unique identifier for the household.', \n  `ration_card_no` STRING COMMENT 'The\
  \ unique household ration card number used for public distribution benefits.', \n\
  \  `scheme_registered_date` DATE COMMENT 'The specific date or timestamp when the\
  \ scheme registered occurred.', \n  `scheme_approved_date` DATE COMMENT 'The specific\
  \ date or timestamp when the scheme approved occurred.', \n  `scheme_processed_date`\
  \ DATE COMMENT 'The specific date or timestamp when the scheme processed occurred.',\
  \ \n  `scheme_last_closed_date` DATE COMMENT 'The specific date or timestamp when\
  \ the scheme last closed occurred.', \n  `scheme_approved_amount` STRING COMMENT\
  \ 'Scheme approved amount.', \n  `scheme_utilized_amount` STRING COMMENT 'Scheme\
  \ utilized amount.', \n  `created_date` TIMESTAMP COMMENT 'Timestamp indicating\
  \ exactly when this record was originally created in the source system.', \n  `created_by`\
  \ STRING COMMENT 'The user ID or automated system process responsible for creating\
  \ this record.', \n  `updated_date` TIMESTAMP COMMENT 'Timestamp indicating the\
  \ last time this record was modified or updated.', \n  `updated_by` STRING COMMENT\
  \ 'The user ID or automated system process responsible for the most recent update\
  \ to this record.')\nROW FORMAT SERDE \n  'org.apache.iceberg.mr.hive.HiveIcebergSerDe'\
  \ \nSTORED BY \n  'org.apache.iceberg.mr.hive.HiveIcebergStorageHandler'\n\nLOCATION\n\
  \  'hdfs://datalakedev/user/CURATED/curated_datamodels/canonicalmodel/citizen_health_schemes'"
