raw_ddl: "CREATE EXTERNAL TABLE `curated_datamodels`.`citizen_student`(\n  `citizen_student_id_pk`\
  \ BIGINT COMMENT 'Primary Key: Unique identifier for the citizen student record.',\
  \ \n  `citizen_school_id_fk` BIGINT COMMENT 'Foreign Key: Links to the associated\
  \ citizen school dimension or master table.', \n  `student_citizen_master_id_fk`\
  \ BIGINT COMMENT 'Foreign Key: Links to the associated student citizen master dimension\
  \ or master table.', \n  `household_id` STRING COMMENT 'Unique identifier for the\
  \ household.', \n  `enrollment_id` STRING COMMENT 'Unique student enrollment identifier.',\
  \ \n  `student_name` STRING COMMENT 'Full legal name of the enrolled student.',\
  \ \n  `gender` STRING COMMENT 'Gender of the individual. Categorical column. Distinct\
  \ values: MALE, FEMALE.', \n  `surname` STRING COMMENT 'The surname / family name\
  \ of the citizen or student.', \n  `mother_tongue` STRING COMMENT 'The primary language\
  \ spoken by the student at home (e.g., Telugu, Urdu, English).', \n  `date_of_birth`\
  \ DATE COMMENT 'The birth date of the individual (citizen, student, or teacher)\
  \ as recorded in official records.', \n  `social_category` STRING COMMENT 'Social\
  \ category classification. Categorical column. Distinct values: General, OBC, SC,\
  \ ST, BC, Minority.', \n  `minority_status` STRING COMMENT 'Minority status.', \n\
  \  `disability_flag` STRING COMMENT 'Boolean indicator flag (values: ''Yes''/''No'').',\
  \ \n  `disability_percentage` DECIMAL(5,2) COMMENT 'Disability percentage.', \n\
  \  `admission_flag` STRING COMMENT 'Boolean indicator flag (values: ''Yes''/''No'').',\
  \ \n  `current_grade` STRING COMMENT 'The current academic class or grade the student\
  \ is enrolled in (e.g., ''1'', ''2'', ..., ''10'').', \n  `medium_key` STRING COMMENT\
  \ 'Categorical column. Distinct values: 3, 5.', \n  `is_current` STRING COMMENT\
  \ 'Boolean indicator flag (values: ''Yes''/''No'').', \n  `mother_citizen_master_id_fk`\
  \ BIGINT COMMENT 'Foreign Key: Links to the associated mother citizen master dimension\
  \ or master table.', \n  `father_citizen_master_id_fk` BIGINT COMMENT 'Foreign Key:\
  \ Links to the associated father citizen master dimension or master table.', \n\
  \  `guardian_citizen_master_id_fk` BIGINT COMMENT 'Foreign Key: Links to the associated\
  \ guardian citizen master dimension or master table.', \n  `is_current_flag` STRING\
  \ COMMENT 'Boolean indicator flag (values: ''Y''/''N'').', \n  `primary_mobile_no`\
  \ STRING COMMENT 'The primary 10-digit mobile contact number registered to the individual.',\
  \ \n  `secondary_mobile_no` STRING COMMENT 'Secondary mobile no.', \n  `email_id`\
  \ STRING COMMENT 'Email identifier.', \n  `address` STRING COMMENT 'System field\
  \ containing values such as: 3-1 PATHARALAPALLI RANASTHALAM SRIKAK..., FAZULBEGPETA\
  \ SRIKAKULAM SRIKAKULAM, 1-59 THALAVARAM VEERAGHATTAM PARVATHI..., 1-209 THALAVARAM\
  \ VEERAGHATTAM PARVATH..., 1-123 THALAVARAM VEERAGHATTAM PARVATH....', \n  `pincode`\
  \ STRING COMMENT 'The 6-digit postal code (PIN code) of the location.', \n  `effective_start_date`\
  \ DATE COMMENT 'The specific date or timestamp when the effective start occurred.',\
  \ \n  `effective_end_date` DATE COMMENT 'The specific date or timestamp when the\
  \ effective end occurred.', \n  `created_date` TIMESTAMP COMMENT 'Timestamp indicating\
  \ exactly when this record was originally created in the source system.', \n  `created_by`\
  \ STRING COMMENT 'The user ID or automated system process responsible for creating\
  \ this record.', \n  `updated_date` TIMESTAMP COMMENT 'Timestamp indicating the\
  \ last time this record was modified or updated.', \n  `updated_by` STRING COMMENT\
  \ 'The user ID or automated system process responsible for the most recent update\
  \ to this record.')\nROW FORMAT SERDE \n  'org.apache.iceberg.mr.hive.HiveIcebergSerDe'\
  \ \nSTORED BY \n  'org.apache.iceberg.mr.hive.HiveIcebergStorageHandler'\n\nLOCATION\n\
  \  'hdfs://datalakedev/user/CURATED/curated_datamodels/canonicalmodel/citizen_student'"
