- table: curated_datamodels.citizen_welfare_schemes_master
  columns: citizen_welfare_schemes_master_pk
- table: curated_datamodels.infrastructure_category_dim
  columns: infra_category_dim_id_pk
- table: curated_datamodels.infrastructure_component_dim
