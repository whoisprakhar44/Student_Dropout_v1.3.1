- name: citizen_vaahan_to_type
  from_table: citizen_asset_vaahan
  from_column: citizen_asset_vaahan_type_fk
  to_table: citizen_asset_vaahan_type
  to_column: citizen_asset_vaahan_type_pk
  cardinality: many_to_one
  usage: Group vehicle asset records by vehicle type.
- name: citizen_utility_to_master
  from_table: citizen_utility_connection
  from_column: citizen_master_fk
  to_table: citizen_master
  to_column: citizen_master_pk
  cardinality: many_to_one
  usage: Join utility connection records to citizen master profiles.
- name: citizen_health_scheme_to_master
  from_table: citizen_health_schemes
  from_column: citizen_master_fk
  to_table: citizen_master
  to_column: citizen_master_pk
  cardinality: many_to_one
  usage: Join health scheme enrollment to citizen master profiles.
- name: citizen_health_scheme_to_scheme_master
  from_table: citizen_health_schemes
  from_column: citizen_health_schemes_master_fk
  to_table: citizen_health_schemes_master
  to_column: citizen_health_schemes_master_pk
