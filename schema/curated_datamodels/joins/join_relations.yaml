- table: curated_datamodels.citizen_school_teacher
  columns: citizen_school_teacher_id_pk, teacher_citizen_master_fk
- table: curated_datamodels.citizen_student
  columns: citizen_student_id_pk, student_name, gender, date_of_birth, 
