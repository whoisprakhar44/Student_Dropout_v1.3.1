  from_column: citizen_welfare_schemes_master_fk
  to_table: citizen_welfare_schemes_master
  to_column: citizen_welfare_schemes_master_pk
  cardinality: many_to_one
  usage: Group citizen welfare scheme enrollment by scheme master.
