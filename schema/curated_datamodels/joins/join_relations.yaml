- table: curated_datamodels.ration_card_family
  columns: ration_card_family_pk, ration_card_type_id_fk, citizen_master_id_fk
- table: curated_datamodels.scheme_benefits_fact
  columns: scheme_benefits_fact_id_pk, citizen_student_id_fk, 
