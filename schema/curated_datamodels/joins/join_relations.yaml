database: curated_datamodels
description: Explicit join relations for the curated Hive/Iceberg data model, 
  including school, citizen canonical, ration card, welfare, and GSWS tables.
joins:
- name: student_to_school
  from_table: citizen_student
  from_column: citizen_school_id_fk
  to_table: citizen_school
  to_column: citizen_school_id_pk
  cardinality: many_to_one
  usage: Join student profile records to school location, category, and 
    infrastructure attributes.
- name: student_attendance_to_student
  from_table: school_student_attendance_fact
  from_column: citizen_student_id_fk
  to_table: citizen_student
  to_column: citizen_student_id_pk
  cardinality: many_to_one
  usage: Join attendance events to student demographics and identifiers.
- name: student_attendance_to_school
  from_table: school_student_attendance_fact
  from_column: student_school_id_fk
  to_table: citizen_school
  to_column: citizen_school_id_pk
  cardinality: many_to_one
  usage: Aggregate student attendance by school, district, mandal, village, or 
    school category.
- name: student_attendance_to_class
  from_table: school_student_attendance_fact
  from_column: student_class_dim_id_fk
  to_table: student_class_dim
  to_column: student_class_dim_id_pk
  cardinality: many_to_one
  usage: Analyze attendance by class, grade, and education stage.
- name: student_attendance_to_absent_reason
  from_table: school_student_attendance_fact
  from_column: absence_reason_dim_id_fk
  to_table: absent_reason_dim
  to_column: absent_reason_dim_id_pk
  cardinality: many_to_one
  usage: Explain absence counts by reason code and reason category.
- name: academic_performance_to_student
  from_table: school_academic_performance_fact
  from_column: citizen_student_id_fk
  to_table: citizen_student
  to_column: citizen_student_id_pk
  cardinality: many_to_one
  usage: Join marks and scores to student demographics.
- name: academic_performance_to_school
  from_table: school_academic_performance_fact
  from_column: citizen_school_id_fk
  to_table: citizen_school
  to_column: citizen_school_id_pk
  cardinality: many_to_one
  usage: Aggregate academic performance by school and geography.
- name: academic_performance_to_subject
  from_table: school_academic_performance_fact
  from_column: student_subject_id_fk
  to_table: school_subject_master
  to_column: subject_pk
  cardinality: many_to_one
  usage: Analyze marks by subject and subject category.
- name: academic_performance_to_assessment
  from_table: school_academic_performance_fact
  from_column: assessment_dim_id_fk
  to_table: assessment_dim
  to_column: assessment_dim_id_pk
  cardinality: many_to_one
  usage: Filter performance by exam, assessment type, and board.
- name: school_to_medium
  from_table: citizen_school
  from_column: school_medium_id_fk
  to_table: school_medium
  to_column: school_medium_pk
  cardinality: many_to_one
  usage: Group schools and students by instruction medium.
- name: school_to_category
  from_table: citizen_school
  from_column: school_category_id_fk
  to_table: school_category
  to_column: school_category_id_pk
  cardinality: many_to_one
  usage: Group schools by category and category type.
- name: teacher_attendance_to_teacher
  from_table: school_teacher_attendance_fact
  from_column: citizen_school_teacher_id_fk
  to_table: citizen_school_teacher
  to_column: citizen_school_teacher_id_pk
  cardinality: many_to_one
  usage: Join teacher attendance facts to teacher profile attributes.
- name: meal_serving_to_school
  from_table: mid_day_meal_serving_fact
  from_column: citizen_school_id_fk
  to_table: citizen_school
  to_column: citizen_school_id_pk
  cardinality: many_to_one
  usage: Aggregate mid-day meal serving metrics by school and geography.
- name: meal_serving_to_meal_type
  from_table: mid_day_meal_serving_fact
  from_column: meal_type_id_fk
  to_table: meal_type_dim
  to_column: meal_type_dim_id_pk
  cardinality: many_to_one
  usage: Analyze meal serving by breakfast, lunch, or other meal type.
- name: scheme_benefits_to_student
  from_table: scheme_benefits_fact
  from_column: citizen_student_id_fk
  to_table: citizen_student
  to_column: citizen_student_id_pk
  cardinality: many_to_one
  usage: Link student benefit eligibility, sanction, and disbursement to student
    profile.
- name: scheme_benefits_to_school
  from_table: scheme_benefits_fact
  from_column: citizen_school_id_fk
  to_table: citizen_school
  to_column: citizen_school_id_pk
  cardinality: many_to_one
  usage: Aggregate scheme benefits by school and location.
- name: scheme_benefits_to_scheme
  from_table: scheme_benefits_fact
  from_column: school_scheme_master_id_fk
  to_table: school_scheme_master
  to_column: school_scheme_dim_id_pk
  cardinality: many_to_one
  usage: Analyze benefit delivery by scheme.
- name: scheme_benefits_to_benefit_type
  from_table: scheme_benefits_fact
  from_column: benefit_type_id_fk
  to_table: benefit_type_dim
  to_column: benefit_type_dim_id_pk
  cardinality: many_to_one
  usage: Group benefit delivery by monetary or non-monetary benefit type.
- name: infrastructure_progress_to_school
  from_table: school_infrastructure_progress_fact
  from_column: citizen_school_id_pk
  to_table: citizen_school
  to_column: citizen_school_id_pk
  cardinality: many_to_one
  usage: Join infrastructure progress to school attributes and location.
- name: infrastructure_progress_to_component
  from_table: school_infrastructure_progress_fact
  from_column: infrastructure_component_id_fk
  to_table: infrastructure_component_dim
  to_column: infrastructure_component_dim_id_pk
  cardinality: many_to_one
  usage: Analyze planned, completed, and functional units by infrastructure 
    component.
- name: infrastructure_component_to_category
  from_table: infrastructure_component_dim
  from_column: infra_category_dim_id_fk
  to_table: infrastructure_category_dim
  to_column: infra_category_dim_id_pk
  cardinality: many_to_one
  usage: Roll infrastructure components up to category.
- name: student_to_citizen_master
  from_table: citizen_student
  from_column: student_citizen_master_id_fk
  to_table: citizen_master
  to_column: citizen_master_pk
  cardinality: many_to_one
  usage: Join student records to the canonical citizen master profile.
- name: student_mother_to_citizen_master
  from_table: citizen_student
  from_column: mother_citizen_master_id_fk
  to_table: citizen_master
  to_column: citizen_master_pk
  cardinality: many_to_one
  usage: Join student records to mother citizen master profile when available.
- name: student_father_to_citizen_master
  from_table: citizen_student
  from_column: father_citizen_master_id_fk
  to_table: citizen_master
  to_column: citizen_master_pk
  cardinality: many_to_one
  usage: Join student records to father citizen master profile when available.
- name: citizen_address_to_master
  from_table: citizen_address_master
  from_column: citizen_master_fk
  to_table: citizen_master
  to_column: citizen_master_pk
  cardinality: many_to_one
  usage: Join citizen addresses to citizen master profiles.
- name: citizen_bank_to_master
  from_table: citizen_bank_accounts
  from_column: citizen_master_fk
  to_table: citizen_master
  to_column: citizen_master_pk
  cardinality: many_to_one
  usage: Join citizen bank accounts to citizen master profiles.
- name: citizen_document_to_master
  from_table: citizen_document
  from_column: citizen_master_fk
  to_table: citizen_master
  to_column: citizen_master_pk
  cardinality: many_to_one
  usage: Join citizen documents to citizen master profiles.
- name: citizen_document_to_type
  from_table: citizen_document
  from_column: citizen_document_type_fk
  to_table: citizen_idty_type
  to_column: citizen_idty_type
  cardinality: many_to_one
  usage: Group citizen documents by identity/document type.
- name: citizen_family_to_master
  from_table: citizen_family_master
  from_column: citizen_master_fk
  to_table: citizen_master
  to_column: citizen_master_pk
  cardinality: many_to_one
  usage: Join family relationship records to the base citizen profile.
- name: citizen_education_to_master
  from_table: citizen_education
  from_column: citizen_master_fk
  to_table: citizen_master
  to_column: citizen_master_pk
  cardinality: many_to_one
  usage: Join citizen education attributes to citizen master profiles.
- name: citizen_land_to_master
  from_table: citizen_land
  from_column: citizen_master_fk
  to_table: citizen_master
  to_column: citizen_master_pk
  cardinality: many_to_one
  usage: Join citizen land records to citizen master profiles.
- name: citizen_agriculture_land_to_master
  from_table: citizen_agriculture_land
  from_column: citizen_master_fk
  to_table: citizen_master
  to_column: citizen_master_pk
  cardinality: many_to_one
  usage: Join agriculture land records to citizen master profiles.
- name: citizen_property_to_master
  from_table: citizen_property
  from_column: citizen_master_fk
  to_table: citizen_master
  to_column: citizen_master_pk
  cardinality: many_to_one
  usage: Join property records to citizen master profiles.
- name: citizen_electricity_to_master
  from_table: citizen_asset_electricity
  from_column: citizen_master_fk
  to_table: citizen_master
  to_column: citizen_master_pk
  cardinality: many_to_one
  usage: Join electricity asset records to citizen master profiles.
- name: citizen_vaahan_to_master
  from_table: citizen_asset_vaahan
  from_column: citizen_master_fk
  to_table: citizen_master
  to_column: citizen_master_pk
  cardinality: many_to_one
  usage: Join vehicle asset records to citizen master profiles.
- name: citizen_vaahan_to_type
  from_table: citizen_asset_vaahan
  from_column: citizen_asset_vaahan_type_fk
  to_table: citizen_asset_vaahan_type
  to_column: citizen_asset_vaahan_type_pk
  cardinality: many_to_one
  usage: Group vehicle asset records by vehicle type.
- name: citizen_utility_to_master
  from_table: citizen_utility_connection
  from_column: citizen_master_fk
  to_table: citizen_master
  to_column: citizen_master_pk
  cardinality: many_to_one
  usage: Join utility connection records to citizen master profiles.
- name: citizen_health_scheme_to_master
  from_table: citizen_health_schemes
  from_column: citizen_master_fk
  to_table: citizen_master
  to_column: citizen_master_pk
  cardinality: many_to_one
  usage: Join health scheme enrollment to citizen master profiles.
- name: citizen_health_scheme_to_scheme_master
  from_table: citizen_health_schemes
  from_column: citizen_health_schemes_master_fk
  to_table: citizen_health_schemes_master
  to_column: citizen_health_schemes_master_pk
  cardinality: many_to_one
  usage: Group citizen health scheme enrollment by scheme master.
- name: citizen_welfare_scheme_to_master
  from_table: citizen_welfare_schemes
  from_column: citizen_master_fk
  to_table: citizen_master
  to_column: citizen_master_pk
  cardinality: many_to_one
  usage: Join welfare scheme enrollment to citizen master profiles.
- name: citizen_welfare_scheme_to_scheme_master
  from_table: citizen_welfare_schemes
  from_column: citizen_welfare_scheme_master_fk
  to_table: citizen_welfare_schemes_master
  to_column: citizen_welfare_schemes_master_pk
  cardinality: many_to_one
  usage: Group citizen welfare scheme enrollment by scheme master.
- name: ration_card_citizen_to_master
  from_table: ration_card_citizen
  from_column: citizen_master_fk
  to_table: citizen_master
  to_column: citizen_master_pk
  cardinality: many_to_one
  usage: Join ration card citizen membership to citizen master profiles.
- name: ration_card_citizen_to_family
  from_table: ration_card_citizen
  from_column: ration_card_family_fk
  to_table: ration_card_family
  to_column: ration_card_family_pk
  cardinality: many_to_one
  usage: Join ration card citizen membership to ration card family records.
- name: ration_card_family_to_type
  from_table: ration_card_family
  from_column: ration_card_type_id_fk
  to_table: ration_card_type
  to_column: card_type_id_pk
  cardinality: many_to_one
  usage: Group ration card families by card type.
- name: citizen_health_scheme_to_student
  from_table: citizen_health_schemes
  from_column: citizen_master_fk
  to_table: citizen_student
  to_column: student_citizen_master_id_fk
  cardinality: many_to_one
  usage: Join health scheme enrollment directly to student profiles via citizen 
    master ID.
- name: citizen_welfare_scheme_to_student
  from_table: citizen_welfare_schemes
  from_column: citizen_master_fk
  to_table: citizen_student
  to_column: student_citizen_master_id_fk
  cardinality: many_to_one
  usage: Join welfare scheme enrollment directly to student profiles via citizen
    master ID.
- name: school_to_teacher
  from_table: citizen_school
  from_column: school_teacher_id_fk
  to_table: citizen_school_teacher
  to_column: citizen_school_teacher_id_pk
  cardinality: many_to_one
  usage: Join school records to their assigned teacher (or headmaster).
- name: infrastructure_progress_to_scheme
  from_table: school_infrastructure_progress_fact
  from_column: scheme_id_fk
  to_table: school_scheme_master
  to_column: school_scheme_dim_id_pk
  cardinality: many_to_one
  usage: Join infrastructure projects to their funding scheme.
- name: school_infra_component_to_infrastructure_component
  from_table: school_infra_component_dim
  from_column: infrastructure_component_dim_id_fk
  to_table: infrastructure_component_dim
  to_column: infrastructure_component_dim_id_pk
  cardinality: many_to_one
  usage: Map school infrastructure components to general infrastructure 
    components.
- name: meal_menu_to_nutrition_item
  from_table: school_meal_menu_dim
  from_column: nutrition_item_dim_id_fk
  to_table: nutrition_item_dim
  to_column: nutrition_item_dim_id_pk
  cardinality: many_to_one
  usage: Map school meal menus to their specific nutrition items.
- name: academic_performance_to_class
  from_table: school_academic_performance_fact
  from_column: student_class_dim_id_fk
  to_table: student_class_dim
  to_column: student_class_dim_id_pk
  cardinality: many_to_one
  usage: Join academic performance to class dimensions to analyze marks by 
    class/grade.
- name: academic_performance_to_medium
  from_table: school_academic_performance_fact
  from_column: school_medium_id_fk
  to_table: school_medium
  to_column: school_medium_pk
  cardinality: many_to_one
  usage: Join academic performance directly to instruction medium.
- name: teacher_attendance_to_student
  from_table: school_teacher_attendance_fact
  from_column: citizen_student_id_fk
  to_table: citizen_student
  to_column: citizen_student_id_pk
  cardinality: many_to_one
  usage: Join teacher attendance to student demographics.
- name: meal_menu_to_meal_type
  from_table: school_meal_menu_dim
  from_column: meal_type_dim_id_fk
  to_table: meal_type_dim
  to_column: meal_type_dim_id_pk
  cardinality: many_to_one
  usage: Join school meal menu to meal type dimension.
- name: student_attendance_to_medium
  from_table: school_student_attendance_fact
  from_column: school_medium_id_fk
  to_table: school_medium
  to_column: school_medium_pk
  cardinality: many_to_one
  usage: Join student attendance directly to instruction medium.
- name: infrastructure_progress_to_category
  from_table: school_infrastructure_progress_fact
  from_column: infrastructure_category_id_fk
  to_table: infrastructure_category_dim
  to_column: infra_category_dim_id_pk
  cardinality: many_to_one
  usage: Join infrastructure progress directly to infrastructure categories.
- name: scheme_benefits_to_beneficiary_type
  from_table: scheme_benefits_fact
  from_column: beneficiary_type_id_fk
  to_table: beneficiary_type_dim
  to_column: beneficiary_type_dim_id_pk
  cardinality: many_to_one
  usage: Join scheme benefits to beneficiary type dimension.
- name: scheme_benefits_to_teacher
  from_table: scheme_benefits_fact
  from_column: school_teacher_id_fk
  to_table: citizen_school_teacher
  to_column: citizen_school_teacher_id_pk
  cardinality: many_to_one
  usage: Join scheme benefits to teacher profiles to track benefit allocations 
    handled by teachers.
- name: teacher_to_citizen
  from_table: citizen_school_teacher
  from_column: teacher_citizen_master_fk
  to_table: citizen_master
  to_column: citizen_master_pk
  cardinality: one_to_one
  usage: Join teacher record to citizen master for demographic detail lookups.
key_columns:
- table: curated_datamodels.absent_reason_dim
  columns: absent_reason_dim_id_pk
- table: curated_datamodels.assessment_dim
  columns: assessment_dim_id_pk
- table: curated_datamodels.beneficiary_type_dim
  columns: beneficiary_type_dim_id_pk
- table: curated_datamodels.benefit_type_dim
  columns: benefit_type_dim_id_pk
- table: curated_datamodels.citizen_address_master
  columns: citizen_address_master_pk, citizen_master_fk
- table: curated_datamodels.citizen_address_master_test
  columns: citizen_address_master_pk, citizen_master_fk
- table: curated_datamodels.citizen_agriculture_land
  columns: citizen_agriculture_land_pk, citizen_master_fk
- table: curated_datamodels.citizen_asset_electricity
  columns: citizen_asset_type_pk, citizen_master_fk
- table: curated_datamodels.citizen_asset_vaahan
  columns: citizen_asset_vaahan_pk, citizen_master_fk, 
    citizen_asset_vaahan_type_fk
- table: curated_datamodels.citizen_asset_vaahan_type
  columns: citizen_asset_vaahan_type_pk
- table: curated_datamodels.citizen_bank_accounts
  columns: citizen_bank_accounts_pk, citizen_master_fk
- table: curated_datamodels.citizen_consent
  columns: citizen_consent_id_pk, citizen_master_fk
- table: curated_datamodels.citizen_document
  columns: citizen_document_pk, citizen_master_fk, citizen_document_type_fk
- table: curated_datamodels.citizen_document_testing
  columns: citizen_document_pk, citizen_master_fk, citizen_document_type_fk
- table: curated_datamodels.citizen_education
  columns: citizen_education_id_pk, citizen_master_fk
- table: curated_datamodels.citizen_family_master
  columns: citizen_family_master_pk, citizen_master_fk, 
    father_citizen_master_fk, mother_citizen_master_fk, spouse_citizen_master_fk
- table: curated_datamodels.citizen_health_schemes
  columns: citizen_health_schemes_pk, citizen_health_schemes_master_fk, 
    citizen_master_fk, household_id, ration_card_no, scheme_approved_date, 
    scheme_approved_amount
- table: curated_datamodels.citizen_health_schemes_master
  columns: citizen_health_schemes_master_pk, health_scheme_code_fk
- table: curated_datamodels.citizen_idty
  columns: citizen_idty_pk, citizen_idty_type_fk
- table: curated_datamodels.citizen_land
  columns: citizen_land_id_pk, citizen_master_fk
- table: curated_datamodels.citizen_master
  columns: citizen_master_pk, citizen_idty_fk
- table: curated_datamodels.citizen_property
  columns: citizen_property_id_pk, citizen_master_fk
- table: curated_datamodels.citizen_school
  columns: citizen_school_id_pk, school_name, district_name, mandal_name, 
    village_name, urban_rural_flag, functional_status, min_class, max_class, 
