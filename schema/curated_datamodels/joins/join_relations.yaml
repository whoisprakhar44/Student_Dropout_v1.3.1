    fail_flag, student_subject_id_fk, exam_date_key_id_fk, student_class_dim_id_fk, 
    assessment_dim_id_fk, school_medium_id_fk, student_exam_id_fk
- table: curated_datamodels.school_category
  columns: school_category_id_pk
- table: curated_datamodels.school_infra_category_dim
  columns: school_infra_category_dim_id_pk
- table: curated_datamodels.school_infra_component_dim
  columns: school_infra_component_dim_id_pk, infrastructure_component_dim_id_fk
- table: curated_datamodels.school_infrastructure_progress_fact
  columns: school_infrastructure_progress_fact_id_pk, citizen_school_id_pk, 
    reporting_date_key_fk, infrastructure_component_id_fk, 
    infrastructure_category_id_fk, reporting_period_id_fk, scheme_id_fk
- table: curated_datamodels.school_meal_menu_dim
  columns: school_meal_menu_dim_id_pk, meal_type_dim_id_fk, 
    nutrition_item_dim_id_fk
- table: curated_datamodels.school_medium
  columns: school_medium_pk
- table: curated_datamodels.school_scheme_master
  columns: school_scheme_dim_id_pk
- table: curated_datamodels.school_student_attendance_fact
  columns: school_student_attendance_fact_id_pk, citizen_student_id_fk, 
    student_school_id_fk, academic_year, present_flag, absent_flag, 
    attendance_status_code, school_medium_id_fk, student_class_dim_id_fk, 
    attendance_date_id_fk, absence_reason_dim_id_fk
- table: curated_datamodels.school_subject_master
  columns: subject_pk, replaced_by_subject_pk
- table: curated_datamodels.school_teacher_attendance_fact
  columns: school_teacher_attendance_fact_id_pk, citizen_school_teacher_id_fk, 
