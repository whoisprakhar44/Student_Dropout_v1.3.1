    citizen_school_id_fk, is_current, student_citizen_master_id_fk, 
    mother_citizen_master_id_fk, father_citizen_master_id_fk, guardian_citizen_master_id_fk
- table: curated_datamodels.citizen_utility_connection
  columns: citizen_utility_connection_fk, citizen_master_fk
- table: curated_datamodels.citizen_welfare_schemes
