  \ 'Foreign Key: Links to the associated citizen document type dimension or master\
  \ table.', \n  `document_name` STRING COMMENT 'System field containing values such\
  \ as: BA202228900540094297, BA202228902270016319, BA202228900990048084, BA202228900320096683,\
  \ BA202228110040026204.', \n  `file_name` STRING COMMENT 'Field containing the file\
