  \ specific date or timestamp when the last amendment occurred.', \n  `digital_signature_hash`\
  \ STRING COMMENT 'Digital signature hash.', \n  `document_storage_path` STRING COMMENT\
  \ 'Document storage path.', \n  `valid_from` STRING COMMENT 'Start date/timestamp\
