raw_ddl: "CREATE EXTERNAL TABLE `curated_datamodels`.`ration_card_type`(\n  `card_type_id_pk`\
  \ INT COMMENT 'Primary Key: Unique identifier for ration card type.', \n  `ration_card_type_name`\
  \ STRING COMMENT 'Ration card type name.', \n  `card_type_description` STRING COMMENT\
  \ 'Categorical column. Distinct values: Economically weaker families, Families above\
  \ poverty line, For poorest households with highest s..., For senior citizens under\
  \ Annapurna s....', \n  `card_type_code` STRING COMMENT 'Code/ID column: The category\
  \ of the ration card (e.g., ''LOW'' for Low Income/BPL). Categorical column. Distinct\
  \ values: 4. Examples: AAY, BPL, AAP, APL. Top frequencies: 1, 1, 1, 1. Categorical\
  \ column.')\nROW FORMAT SERDE \n  'org.apache.iceberg.mr.hive.HiveIcebergSerDe'\
  \ \nSTORED BY \n  'org.apache.iceberg.mr.hive.HiveIcebergStorageHandler'\n\nLOCATION\n\
  \  'hdfs://datalakedev/user/CURATED/curated_datamodels/canonicalmodel/ration_card_type'"
