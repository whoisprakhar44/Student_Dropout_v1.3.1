  \ (e.g. State Bank of India, Andhra Pragathi Grameena Bank).', \n  `bank_type` STRING\
  \ COMMENT 'Classification field defining the specific bank type.', \n  `bank_branch`\
  \ STRING COMMENT 'The specific branch name of the bank where the account is held.',\
  \ \n  `bank_ifsc_code` STRING COMMENT 'Code/ID column: Standardized system code\
  \ representing the bank ifsc. Categorical column.', \n  `created_date` TIMESTAMP\
  \ COMMENT 'Timestamp indicating exactly when this record was originally created\
  \ in the source system.', \n  `created_by` STRING COMMENT 'The user ID or automated\
  \ system process responsible for creating this record.', \n  `updated_date` TIMESTAMP\
  \ COMMENT 'Timestamp indicating the last time this record was modified or updated.',\
  \ \n  `updated_by` STRING COMMENT 'The user ID or automated system process responsible\
