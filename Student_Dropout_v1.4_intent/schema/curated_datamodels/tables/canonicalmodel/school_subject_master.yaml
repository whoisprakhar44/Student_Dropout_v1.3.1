raw_ddl: "CREATE EXTERNAL TABLE `curated_datamodels`.`school_subject_master`(\n  `subject_pk`\
  \ BIGINT COMMENT 'Primary Key: Unique identifier for the subject record.', \n  `subject_code`\
  \ STRING COMMENT 'Code/ID column: Standardized system code representing the subject.\
  \ Categorical column. Distinct values: 136. Examples: S100, S129, S120, S113, S145.\
  \ Top frequencies: 1, 1, 1, 1, 1. Categorical column.', \n  `subject_name` STRING\
  \ COMMENT 'The official name of the academic subject (e.g., Mathematics, Science,\
  \ Social Studies).', \n  `subject_short_name` STRING COMMENT 'Subject short name.',\
  \ \n  `subject_category` STRING COMMENT 'Classification field defining the specific\
  \ subject category.', \n  `subject_type` STRING COMMENT 'Classification field defining\
  \ the specific subject type.', \n  `language_order` INT COMMENT 'Language order.',\
  \ \n  `is_vocational_flag` STRING COMMENT 'Boolean indicator flag (values: ''Y''/''N'').',\
  \ \n  `is_skill_subject_flag` STRING COMMENT 'Boolean indicator flag (values: ''Y''/''N'').',\
  \ \n  `min_class` INT COMMENT 'The minimum class or grade level (e.g. Class 1 or\
  \ Class 6) for which this category/subject is applicable.', \n  `max_class` INT\
  \ COMMENT 'The maximum class or grade level (e.g. Class 5 or Class 10) for which\
  \ this category/subject is applicable.', \n  `medium_id` BIGINT COMMENT 'Medium\
  \ identifier.', \n  `is_compulsory_flag` STRING COMMENT 'Boolean indicator flag\
  \ (values: ''Y''/''N'').', \n  `board_code` STRING COMMENT 'Code/ID column: Standardized\
  \ system code representing the board. Categorical column. Distinct values: 1. Top\
  \ frequencies: 136. Categorical column.', \n  `assessment_pattern` STRING COMMENT\
  \ 'Assessment pattern.', \n  `marks_scheme` STRING COMMENT 'Field containing the\
  \ marks scheme details for the table.', \n  `credit_weight` DECIMAL(5,2) COMMENT\
  \ 'The credit or weight assigned to the subject in overall performance calculations.',\
  \ \n  `subject_status` STRING COMMENT 'Categorical column. Distinct values: Active.',\
  \ \n  `grade_applicability_from` INT COMMENT 'Grade applicability from.', \n  `grade_applicability_to`\
  \ INT COMMENT 'Grade applicability to.', \n  `effective_from` DATE COMMENT 'Effective\
  \ from.', \n  `effective_to` DATE COMMENT 'Field containing the effective to details\
  \ for the table.', \n  `replaced_by_subject_pk` BIGINT COMMENT 'Primary Key: Unique\
  \ identifier for the replaced by subject record.', \n  `created_date` TIMESTAMP\
  \ COMMENT 'Timestamp indicating exactly when this record was originally created\
  \ in the source system.', \n  `created_by` STRING COMMENT 'The user ID or automated\
  \ system process responsible for creating this record.', \n  `updated_date` TIMESTAMP\
  \ COMMENT 'Timestamp indicating the last time this record was modified or updated.',\
  \ \n  `updated_by` STRING COMMENT 'The user ID or automated system process responsible\
  \ for the most recent update to this record.')\nROW FORMAT SERDE \n  'org.apache.iceberg.mr.hive.HiveIcebergSerDe'\
  \ \nSTORED BY \n  'org.apache.iceberg.mr.hive.HiveIcebergStorageHandler'\n\nLOCATION\n\
  \  'hdfs://datalakedev/user/CURATED/curated_datamodels/canonicalmodel/school_subject_master'"
