raw_ddl: "CREATE EXTERNAL TABLE `curated_datamodels`.`core_temple_ddns`(\n  `district_id`\
  \ INT COMMENT 'District id.', \n  `mandal_id` INT COMMENT 'Mandal id.', \n  `village_id`\
  \ INT COMMENT 'Village id.', \n  `district_name` STRING COMMENT 'The official name\
  \ of the administrative district in Andhra Pradesh.', \n  `mandal_name` STRING COMMENT\
  \ 'The official name of the Mandal (sub-district administrative division).', \n\
  \  `village_name` STRING COMMENT 'Village name.', \n  `temple_id` INT COMMENT 'Temple\
  \ id.', \n  `temple_nm` STRING COMMENT 'Temple nm.', \n  `archaka_name` STRING COMMENT\
  \ 'Archaka name.', \n  `mobile_no` STRING COMMENT 'Mobile no.', \n  `aadhaar_number`\
  \ STRING COMMENT 'Aadhaar number.', \n  `amount` DECIMAL(12,3) COMMENT 'Amount.',\
  \ \n  `inserted_date` BIGINT COMMENT 'The specific date or timestamp when the inserted\
  \ occurred.', \n  `inserted_ts` TIMESTAMP COMMENT 'Inserted ts.', \n  `op` STRING\
  \ COMMENT 'Op.', \n  `event_ts` BIGINT COMMENT 'Event ts.', \n  `deleted_flag` BOOLEAN\
  \ COMMENT 'Boolean indicator flag (values: ''Y''/''N'').')\nROW FORMAT SERDE \n\
  \  'org.apache.iceberg.mr.hive.HiveIcebergSerDe' \nSTORED BY \n  'org.apache.iceberg.mr.hive.HiveIcebergStorageHandler'\n\
  \nLOCATION\n  'hdfs://datalakedev/warehouse/tablespace/external/hive/curated_datamodels.db/core_temple_ddns'"
